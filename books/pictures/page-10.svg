<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" font-family="Comic Sans MS, sans-serif">
  <rect width="400" height="300" fill="#FFF4D6"/>

  <!-- Workbench surface -->
  <rect x="0" y="220" width="400" height="80" fill="#A67B5B"/>
  <line x1="0" y1="220" x2="400" y2="220" stroke="#5C3D24" stroke-width="2"/>

  <!-- Wall hooks for tools -->
  <line x1="0" y1="60" x2="400" y2="60" stroke="#5C3D24" stroke-width="2" stroke-dasharray="5,3"/>

  <!-- Tools hanging -->
  <!-- Screwdriver -->
  <g transform="translate(60, 75)">
    <rect x="-3" y="0" width="6" height="40" fill="#888"/>
    <rect x="-8" y="40" width="16" height="20" rx="3" fill="#FF4444"/>
  </g>
  <!-- Hammer -->
  <g transform="translate(110, 75)">
    <rect x="-3" y="0" width="6" height="50" fill="#8B4513"/>
    <rect x="-15" y="-5" width="30" height="12" rx="2" fill="#666"/>
  </g>
  <!-- Wrench -->
  <g transform="translate(155, 75)">
    <rect x="-2" y="10" width="4" height="40" fill="#666"/>
    <path d="M-10 0 L-10 15 L10 15 L10 0 L5 5 L-5 5 Z" fill="#666"/>
  </g>

  <!-- Workbench items -->
  <!-- Wires -->
  <g stroke="#FF4444" stroke-width="3" fill="none">
    <path d="M40 250 Q90 245 130 260"/>
  </g>
  <g stroke="#00AA66" stroke-width="3" fill="none">
    <path d="M50 265 Q110 255 140 270"/>
  </g>
  <g stroke="#0066FF" stroke-width="3" fill="none">
    <path d="M60 275 Q120 268 145 280"/>
  </g>

  <!-- Small project board on the right side of workbench -->
  <g transform="translate(290, 240)">
    <rect x="-30" y="0" width="60" height="35" rx="3" fill="#3CB043" stroke="#1A5523" stroke-width="1"/>
    <!-- Components on board -->
    <rect x="-22" y="6" width="10" height="6" fill="#222"/>
    <rect x="-5" y="6" width="10" height="6" fill="#222"/>
    <rect x="12" y="6" width="10" height="6" fill="#222"/>
    <circle cx="-15" cy="22" r="3" fill="#FFE066"/>
    <circle cx="0" cy="22" r="3" fill="#FF4444"/>
    <circle cx="15" cy="22" r="3" fill="#00CCFF"/>
  </g>

  <!-- The reader (a child) standing at the bench, viewed from behind -->
  <g transform="translate(200, 170)">
    <!-- Head -->
    <circle cx="0" cy="0" r="32" fill="#FFD4A6"/>
    <!-- Hair (back of head) -->
    <path d="M-32 -5 Q0 -45 32 -5 Q25 -25 0 -30 Q-25 -25 -32 -5 Z" fill="#3B2A1A"/>
    <!-- Body -->
    <rect x="-32" y="32" width="64" height="68" rx="8" fill="#9B59B6"/>
    <!-- Arms reaching down to bench -->
    <rect x="-44" y="55" width="18" height="40" rx="9" fill="#9B59B6"/>
    <rect x="26" y="55" width="18" height="40" rx="9" fill="#9B59B6"/>
    <!-- Hands -->
    <circle cx="-35" cy="100" r="8" fill="#FFD4A6"/>
    <circle cx="35" cy="100" r="8" fill="#FFD4A6"/>
  </g>

  <!-- Thought bubble: "?" -->
  <g>
    <circle cx="320" cy="100" r="22" fill="white" stroke="#444" stroke-width="2"/>
    <circle cx="290" cy="130" r="6" fill="white" stroke="#444" stroke-width="2"/>
    <circle cx="278" cy="145" r="3" fill="white" stroke="#444" stroke-width="2"/>
    <text x="320" y="108" text-anchor="middle" font-size="26" font-weight="bold" fill="#444">?</text>
  </g>

  <!-- Title -->
  <text x="200" y="40" text-anchor="middle" font-size="22" font-weight="bold" fill="#2A2A2A">What will YOU build?</text>
</svg>
