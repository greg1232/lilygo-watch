<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" font-family="Comic Sans MS, sans-serif">
  <rect width="400" height="300" fill="#EAF4FB"/>

  <!-- Watch body (big and centered) -->
  <g transform="translate(140, 75)">
    <rect x="0" y="0" width="120" height="150" rx="20" fill="#1A1A2A" stroke="#444" stroke-width="3"/>
    <!-- Crown -->
    <rect x="120" y="60" width="9" height="22" fill="#888" stroke="#444" stroke-width="1"/>
    <!-- Screen -->
    <rect x="8" y="8" width="104" height="134" rx="6" fill="#000"/>
    <!-- Pacific Time header -->
    <text x="60" y="30" text-anchor="middle" font-size="10" fill="#999">Pacific Time</text>
    <!-- Big time -->
    <text x="60" y="80" text-anchor="middle" font-size="32" font-weight="bold" fill="#00FF66" font-family="monospace">1:42</text>
    <!-- Seconds + AM/PM -->
    <text x="60" y="105" text-anchor="middle" font-size="13" fill="#00AA44" font-family="monospace">07 PM</text>
    <!-- Date -->
    <text x="60" y="130" text-anchor="middle" font-size="9" fill="#00CCFF">Sun May 24</text>
    <!-- Battery icon -->
    <rect x="86" y="14" width="20" height="10" rx="1" fill="none" stroke="white" stroke-width="1"/>
    <rect x="106" y="17" width="2" height="4" fill="white"/>
    <rect x="88" y="16" width="14" height="6" fill="#00FF66"/>
  </g>

  <!-- Cartoon clock waving -->
  <g transform="translate(60, 175)">
    <circle cx="0" cy="0" r="38" fill="#FFE066" stroke="#B8941F" stroke-width="3"/>
    <!-- Hour markers -->
    <line x1="0" y1="-30" x2="0" y2="-25" stroke="#444" stroke-width="2"/>
    <line x1="30" y1="0" x2="25" y2="0" stroke="#444" stroke-width="2"/>
    <line x1="0" y1="30" x2="0" y2="25" stroke="#444" stroke-width="2"/>
    <line x1="-30" y1="0" x2="-25" y2="0" stroke="#444" stroke-width="2"/>
    <!-- Hands -->
    <line x1="0" y1="0" x2="0" y2="-20" stroke="#222" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="15" y2="5" stroke="#222" stroke-width="3" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="3" fill="#222"/>
    <!-- Face -->
    <circle cx="-10" cy="-7" r="2" fill="#222"/>
    <circle cx="10" cy="-7" r="2" fill="#222"/>
    <path d="M-8 12 Q0 18 8 12" stroke="#222" stroke-width="2" fill="none"/>
  </g>

  <!-- Ticks -->
  <text x="340" y="180" text-anchor="middle" font-size="18" fill="#00AA44">tick</text>
  <text x="340" y="210" text-anchor="middle" font-size="18" fill="#00AA44">tick</text>
  <text x="340" y="240" text-anchor="middle" font-size="18" fill="#00AA44">tick</text>

  <!-- Title -->
  <text x="200" y="40" text-anchor="middle" font-size="22" font-weight="bold" fill="#2A2A2A">Telling Time!</text>
</svg>
